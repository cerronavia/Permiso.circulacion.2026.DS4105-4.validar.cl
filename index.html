<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡EXITO! Permiso Aprobado</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #27ae60; /* Verde para aprobación */
            --dark-bg: #2c3e50;    
            --light-text: #ecf0f1; 
            --success-blue: #3498db; 
        }

        body {
            margin: 0;
            font-family: 'Open Sans', sans-serif;
            background-color: var(--dark-bg);
            color: var(--light-text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 3rem;
            max-width: 90%;
            width: 700px;
            background-color: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: fadeInScale 1s ease-out forwards;
            position: relative;
            border-top: 8px solid var(--primary-green);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .alert-icon {
            font-size: 8rem;
            color: var(--primary-green);
            margin-bottom: 1rem;
            animation: bounceIn 1.2s ease-out forwards;
            display: inline-block;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.5rem;
            color: var(--primary-green);
            margin: 0.5rem 0 1rem 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            animation: slideInLeft 1s ease-out forwards 0.3s;
            opacity: 0;
        }

        .plate-number {
            font-family: 'Montserrat', sans-serif;
            font-size: 4.5rem;
            background-color: #f1c40f;
            color: #2c3e50;
            padding: 10px 30px;
            border-radius: 10px;
            display: inline-block;
            margin: 1rem 0;
            font-weight: 900;
            border: 4px solid #000;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
            opacity: 0;
            animation: fadeIn 1s ease-out forwards 0.6s;
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .message {
            font-size: 1.8rem;
            line-height: 1.4;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards 0.8s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .authority {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            color: var(--success-blue);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0;
            animation: slideInRight 1s ease-out forwards 1.2s;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .plate-number { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="alert-icon">
            &#10004; </div>
        <h1>Permiso Aprobado</h1>
        
        <div class="plate-number">DS4105</div>

        <p class="message">
            Vehículo autorizado para circular libremente.
        </p>
        <p class="authority">
            Validado por Comuna de Cerro Navia
        </p>
    </div>

</body>
</html>
